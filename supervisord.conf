[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:mercury]
command=mercury run fase2_visualizaciones_mercury.ipynb 0.0.0.0:7860
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=1

[program:celery]
command=bash -c "sleep 8 && celery -A mercury.server worker --concurrency=1 -P solo -l info"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=2
